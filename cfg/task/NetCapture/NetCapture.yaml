name: NetCapture

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 4
  max_episode_length: 600

drone_model:
  name: Hummingbird
  controller: LeePositionController

num_drones: 4

# Net parameters
net_rows: 6
net_cols: 6
net_spacing: 0.25       # distance between adjacent nodes (m) — 5×5 → 1.0m wide
rope_links: 16           # segments per rope (particles for PBD)
rope_link_length: 0.1    # segment length (m) — total ~1.6m

# PBD particle rope (GPU-native, NO D6 joints, NO CPU API fallbacks)
use_pbd_rope: true
pbd_particle_mass: 0.01
pbd_stretch_stiffness: 1.0e6   # rope-like tension (non-negotiable)
pbd_bend_stiffness: 0.02       # ultra-soft at 48 iters → natural U-shape draping
pbd_shear_stiffness: 5.0e3     # prevent ribbon twist, allow mild torsion
pbd_spring_damping: 20.0       # balanced — not sticky, not jittery
pbd_velocity_damping: 0.1      # light air resistance → natural sway
pbd_solver_iterations: 48      # high iterations lock stretch only, not bend

# Target parameters
target_size: [0.3, 0.3, 0.3]  # (x, y, z) metres

# Reward weights — see net_capture.py:_compute_reward_and_done for formulas
#   r = r_sep · ( w_pos·r_pos + w_head·r_pos·r_head + w_up·r_up + r_eff + r_smooth )
reward_coverage_weight: 1.5     # w_pos  — position attraction
reward_descend_weight: 1.0      # w_head — heading alignment (coupled with r_pos)
reward_up_weight: 0.1           # w_up   — drone upright
reward_effort_weight: 0.05      # w_eff  — energy penalty (already in r_eff)
reward_action_smoothness_weight: 0.0  # w_smooth — off for now

# Reward scale — lower β gives wider effective range for early exploration
reward_distance_scale: 1.0      # β — r_pos = exp(-β·dist), effective range ~2m

# Termination
reset_thres: 8.0         # generous threshold for early exploration

# Drone safety
safe_distance: 0.8

action_scale: 0.1        # dampen exploration: 0.1 × random action barely perturbs hover thrust

ravel_obs: true
ravel_obs_central: true

action_transform: null
